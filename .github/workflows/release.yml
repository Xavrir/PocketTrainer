name: Checkpoint release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing checkpoint tag (for example v0.2.0-demo)"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: pnpm install --frozen-lockfile
      - name: Verify tag exists
        run: git rev-parse "${{ inputs.tag }}^{tag}"
      - name: Prepare public release configuration
        env:
          API_BASE_URL: ${{ vars.POCKETTRAINER_API_BASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.POCKETTRAINER_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_URL: ${{ vars.POCKETTRAINER_SUPABASE_URL }}
        run: |
          test -n "$API_BASE_URL"
          test -n "$SUPABASE_PUBLISHABLE_KEY"
          test -n "$SUPABASE_URL"
          case "$API_BASE_URL" in
            https://*) ;;
            *) echo "Release API URL must use HTTPS." >&2; exit 1 ;;
          esac
          node - "$API_BASE_URL" <<'NODE'
          const raw = process.argv[2];
          const url = new URL(raw);
          const host = url.hostname.toLowerCase().replace(/^\[|\]$/g, '');
          const octets = host.split('.').map(Number);
          const privateIpv4 = octets.length === 4 && octets.every(Number.isInteger) && (
            octets[0] === 0 || octets[0] === 10 || octets[0] === 127 ||
            (octets[0] === 169 && octets[1] === 254) ||
            (octets[0] === 172 && octets[1] >= 16 && octets[1] <= 31) ||
            (octets[0] === 192 && octets[1] === 168)
          );
          const localHost = host === 'localhost' || host.endsWith('.localhost') ||
            host.endsWith('.local') || host === '::' || host === '::1' ||
            /^f[cd][0-9a-f:]+$/i.test(host) || /^fe[89ab][0-9a-f:]+$/i.test(host);
          const quickTunnel = host === 'trycloudflare.com' || host.endsWith('.trycloudflare.com');
          if (privateIpv4 || localHost || quickTunnel) {
            console.error('Release API URL cannot point to a development/private/temporary endpoint.');
            process.exit(1);
          }
          NODE
          printf '%s\n' \
            "POCKETTRAINER_SUPABASE_URL=$SUPABASE_URL" \
            "POCKETTRAINER_SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY" \
            "POCKETTRAINER_API_BASE_URL=$API_BASE_URL" \
            "POCKETTRAINER_ALLOW_AUTH_BYPASS=false" \
            > apps/mobile/.env.release
      - name: Build self-contained Android demo
        working-directory: apps/mobile/android
        run: ENVFILE=.env.release ./gradlew :app:assembleRelease
      - name: Reject development URLs and bundled secrets
        run: |
          APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          STRINGS=/tmp/pockettrainer-apk-strings.txt
          unzip -p "$APK" assets/index.android.bundle | strings > "$STRINGS"
          while read -r dex; do
            unzip -p "$APK" "$dex" | strings >> "$STRINGS"
          done < <(unzip -Z1 "$APK" | grep -E '^classes[0-9]*\.dex$')
          if grep -Eq 'http://(localhost|127\.0\.0\.1|10\.0\.2\.2):3000(/|$)|GOCSPX-|client_secret|service_role' "$STRINGS"; then
            echo "Release bundle contains a development URL or secret marker." >&2
            exit 1
          fi
          API_BASE_URL=$(sed -n 's/^POCKETTRAINER_API_BASE_URL=//p' apps/mobile/.env.release)
          grep -Fq "$API_BASE_URL" "$STRINGS"
          sha256sum "$APK" > "$APK.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: |
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            apps/mobile/android/app/build/outputs/apk/release/app-release.apk.sha256
