name: Checkpoint release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing checkpoint tag (for example v0.2.0-demo)"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: pnpm install --frozen-lockfile
      - name: Verify tag exists
        run: git rev-parse "${{ inputs.tag }}^{tag}"
      - name: Build self-contained Android demo
        working-directory: apps/mobile/android
        run: ./gradlew :app:assembleRelease
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: apps/mobile/android/app/build/outputs/apk/release/app-release.apk
