name: Feature proposal
description: Propose an MVP-aligned improvement
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the beginner fitness problem before proposing UI or technology.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety, privacy, and offline impact
    validations:
      required: true
