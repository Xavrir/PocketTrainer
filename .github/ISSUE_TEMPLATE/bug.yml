name: Bug report
description: Report a reproducible PocketTrainer defect
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not include health data, camera frames, tokens, or private account information.
  - type: input
    id: checkpoint
    attributes:
      label: Checkpoint or commit
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Include expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Android device and OS
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed private media, health data, locations, and credentials.
          required: true
